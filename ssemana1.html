<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsivo Simple</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .box {
      width: 50%;
      margin: auto;
      padding: 20px;
      background: lightblue;
    }

    /* Media Query */
    @media (max-width: 600px) {
      .box {
        width: 100%;
        background: lightcoral;
      }
    }
  </style>
</head>

<body>

  <h2>Prueba Responsiva</h2>
  <div class="box">Cambia el tamaño de pantalla</div>

</body>
</html>
